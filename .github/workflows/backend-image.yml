name: Build Belink AI backend image

on:
  push:
    branches: ["main"]
    paths:
      - "belink-ai-v2/backend/**"
      - ".github/workflows/backend-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: belink-ai-backend-image
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/safarma-belink-ai
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./belink-ai-v2/backend
          file: ./belink-ai-v2/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "## Belink AI backend image" >> "$GITHUB_STEP_SUMMARY"
          echo "\`ghcr.io/${GITHUB_REPOSITORY_OWNER}/safarma-belink-ai:latest\`" >> "$GITHUB_STEP_SUMMARY"
