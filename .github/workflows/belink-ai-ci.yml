name: Belink AI backend CI

on:
  push:
    branches: ["main"]
    paths:
      - "belink-ai-v2/backend/**"
      - ".github/workflows/belink-ai-ci.yml"
  pull_request:
    paths:
      - "belink-ai-v2/backend/**"
      - ".github/workflows/belink-ai-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: belink-ai-v2/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        run: python -m pip install --upgrade uv
      - name: Install dependencies
        run: uv sync --frozen --dev
      - name: Compile
        run: uv run python -m compileall -q .
      - name: Run tests
        run: uv run pytest -q
