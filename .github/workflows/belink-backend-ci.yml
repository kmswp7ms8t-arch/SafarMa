name: Belink AI Backend CI

on:
  push:
    branches: ["main"]
    paths:
      - "belink-ai-v2/backend/**"
      - ".github/workflows/belink-backend-ci.yml"
  pull_request:
    paths:
      - "belink-ai-v2/backend/**"
      - ".github/workflows/belink-backend-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: belink-ai-v2/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        run: python -m pip install --upgrade uv
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run backend tests
        run: uv run pytest -q
      - name: Run decision evals
        run: uv run python evals/run_local.py
      - name: Validate demo path
        run: uv run python main.py --demo > /tmp/belink-demo.txt

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build production container
        run: docker build -t safarma-belink-ai ./belink-ai-v2/backend
